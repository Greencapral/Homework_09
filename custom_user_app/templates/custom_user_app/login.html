{% extends 'store_app/base.html' %}


{% block body %}
    <h1>Вход в личный кабинет</h1>
    <form method="post" class="mt-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Войти</button>
    </form>
    <p class="mt-3">
        Нет аккаунта?
        <a href="{% url 'register' %}" class="btn btn-secondary mt-3">Зарегистрироваться</a>
    </p>
{% endblock  %}
