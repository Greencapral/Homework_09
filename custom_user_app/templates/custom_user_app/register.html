{% extends 'store_app/base.html' %}

{% block header %} Выход {% endblock %}

{% block body %}
    <h1>Вы вышли из аккаунта</h1>
    <form method="post" class="mt-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
    </form>
    <p class="mt-3">
        Войти снова?
        <a href="{% url 'login' %}" class="btn btn-primary mt-3">Войти</a>
    </p>
{% endblock  %}
